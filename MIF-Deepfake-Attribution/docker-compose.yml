version: '3.8'

services:

  mif-postgres:
    image: postgres:15-alpine
    container_name: mif_postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mif_deepfake_db

    ports:
      - "5432:5432"

    volumes:
      - mif_db_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mif_db_data: